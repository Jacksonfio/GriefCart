  # ─── API Gateway ────────────────────────────────────────────
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "griefcart-${Environment}-api"
      StageName: v1
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
            Identity:
              Header: Authorization
              ValidationExpression: "^.*"
      EndpointConfiguration: REGIONAL
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: "INFO"
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingRateLimit: 1000

  # ─── API Routes ─────────────────────────────────────────────
  DocumentsApi:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "griefcart-${Environment}-documents-api"
      CodeUri: lambdas/document-vault/
      Handler: index.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBWritePolicy:
            TableName: !Ref DocumentsTable
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::${DocumentBucket}/*"
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt KmsKey.Arn
      Environment:
        Variables:
          DOCUMENT_BUCKET: !Ref DocumentBucket
          KMS_KEY_ID: !Ref KmsKey
      Events:
        Upload:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents/upload
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        List:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        Get:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents/{id}
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        Delete:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents/{id}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuthorizer

