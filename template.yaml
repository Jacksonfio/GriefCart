  # ─── Step Functions Role ────────────────────────────────────
  StepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "griefcart-${Environment}-step-functions"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StepFunctionsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  [
                    lambda:InvokeFunction,
                    kms:Decrypt,
                    logs:CreateLogStream,
                    logs:PutLogEvents,
                  ]
                Resource: "*"

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint"
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/v1"
  CognitoDomain:
    Description: "Cognito Hosted UI domain (prefix with https:// and suffix with .auth.REGION.amazoncognito.com)"
    Value: !Sub "griefcart-${Environment}"
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref CognitoUserPoolClient
  DocumentBucketName:
    Description: "S3 Document Vault"
    Value: !Ref DocumentBucket
  KmsKeyId:
    Description: "KMS Key ID"
    Value: !Ref KmsKey
  StateMachineArn:
    Description: "Emergency Step Functions state machine ARN"
    Value: !Ref EmergencyWorkflow
