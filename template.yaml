      Handler: index.lambda_handler
      Timeout: 30
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cloudtrail:LookupEvents
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${AuditLogBucket}/*"
            - Effect: Allow
