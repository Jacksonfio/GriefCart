AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: "GriefCart — AI Financial Continuity & Asset Recovery Platform"

Parameters:
  Environment:
    Type: String
    Default: dev
  AppUrl:
    Type: String
    Default: "http://localhost:5173"
    Description: OAuth callback/logout URL (frontend origin)
  SesSourceEmail:
    Type: String
    Default: "jacksonjp646@gmail.com"
  GeminiApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: "(Legacy) Google Gemini API key — only needed if LLMProvider=gemini"
  GeminiApiKeySecretArn:
    Type: String
    Default: "arn:aws:secretsmanager:us-east-1:632672560279:secret:griefcart/dev/gemini-api-key-v2-Zpjk1p"
    Description: "(Legacy) ARN of the Gemini API key secret in Secrets Manager"
  HuggingFaceApiKeySecretArn:
    Type: String
    Default: ""
    Description: "ARN of a Secrets Manager secret containing the HuggingFace API token (used when LLMProvider=huggingface or as Bedrock fallback)"
  LLMProvider:
    Type: String
    Default: "bedrock"
    AllowedValues: ["bedrock", "huggingface", "gemini"]
    Description: "AI provider - bedrock uses AWS-hosted open-source models (Llama 3 / Mistral), huggingface calls HF Inference API directly, gemini is legacy"
  BedrockModelId:
    Type: String
    Default: "meta.llama3-70b-instruct-v1:0"
    Description: "AWS Bedrock model ID to use (must be enabled in Bedrock console). Options: meta.llama3-70b-instruct-v1:0, meta.llama3-8b-instruct-v1:0, mistral.mistral-7b-instruct-v0:2"
  HuggingFaceModelId:
    Type: String
    Default: "meta-llama/Llama-3.1-8B-Instruct"
    Description: "HuggingFace model to use via HF Inference API (when LLMProvider=huggingface)"
  KmsKeyAlias:
    Type: String
    Default: "griefcart-primary"

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        DOCUMENTS_TABLE: !Ref DocumentsTable
        TRUSTED_PERSONS_TABLE: !Ref TrustedPersonsTable
        CONTINUITY_PLANS_TABLE: !Ref ContinuityPlansTable
        FINANCIAL_TWIN_TABLE: !Ref FinancialTwinTable
        GRAPH_SYNC_QUEUE: !Ref GraphSyncQueue
        DOCUMENT_BUCKET: !Ref DocumentBucket
        SNS_TOPIC_ARN: !Ref NotificationTopic
        KMS_KEY_ID: !Ref KmsKey
        APP_URL: !Ref AppUrl
        SES_SOURCE_EMAIL: !Ref SesSourceEmail
        LEGACY_TABLE: !Ref LegacyLettersTable
        GEMINI_API_KEY_SECRET: !Ref GeminiApiKeySecretArn
        # ─── AI Provider Configuration ───
        LLM_PROVIDER: !Ref LLMProvider
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        HF_MODEL_ID: !Ref HuggingFaceModelId
        HF_API_KEY_SECRET: !Ref HuggingFaceApiKeySecretArn
        AWS_ACCOUNT_ID: !Ref AWS::AccountId

Conditions:
  # True when a HuggingFace API key secret ARN is provided
  HFSecretProvided: !Not [!Equals [!Ref HuggingFaceApiKeySecretArn, ""]]

Resources:
  # ─── KMS ───────────────────────────────────────────────────────
  KmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: "GriefCart primary encryption key"
      EnableKeyRotation: true
      RotationPeriodInDays: 90
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: "*"

  KmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${KmsKeyAlias}"
      TargetKeyId: !Ref KmsKey

  # ─── S3 Document Vault ────────────────────────────────────────
  DocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "griefcart-${Environment}-documents"
      VersioningConfiguration:
        Status: Enabled
      ObjectLockEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKey
            BucketKeyEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: NoncurrentVersionRetention
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
      LoggingConfiguration:
        DestinationBucketName: !Ref AuditLogBucket
        LogFilePrefix: s3-access/

  DocumentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "arn:aws:s3:::${DocumentBucket}/*"
              - !Sub "arn:aws:s3:::${DocumentBucket}"
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  # ─── DynamoDB ─────────────────────────────────────────────────
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "griefcart-${Environment}-users"
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "griefcart-${Environment}-documents"
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: category-index
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: KEYS_ONLY
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  TrustedPersonsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "griefcart-${Environment}-trusted-persons"
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: personId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: personId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  ContinuityPlansTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "griefcart-${Environment}-continuity-plans"
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: planId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: planId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  FinancialTwinTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "griefcart-${Environment}-financial-twin"
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: twinId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: twinId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  LegacyLettersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "griefcart-${Environment}-legacy-letters"
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: legacyId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: legacyId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ─── SQS ─────────────────────────────────────────────────────
  GraphSyncQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "griefcart-${Environment}-graph-sync"
      KmsMasterKeyId: !Ref KmsKey
      VisibilityTimeout: 120

  # ─── SNS ─────────────────────────────────────────────────────
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "griefcart-${Environment}-alerts"
      KmsMasterKeyId: !Ref KmsKey

  # ─── Cognito ─────────────────────────────────────────────────
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "griefcart-${Environment}-pool"
      AutoVerifiedAttributes: [email]
      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      LambdaConfig:
        PostConfirmation: !GetAtt CognitoTriggersFunction.Arn
        PostAuthentication: !GetAtt CognitoTriggersFunction.Arn
        PreAuthentication: !GetAtt CognitoTriggersFunction.Arn

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "griefcart-${Environment}-client"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_CUSTOM_AUTH
      AllowedOAuthFlows:
        - implicit
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Ref AppUrl
        - "https://d1yywp83atcbrx.cloudfront.net"
        - "https://jacksonfio-griefcart-financial-continuity.hf.space"
      LogoutURLs:
        - !Ref AppUrl
        - "https://d1yywp83atcbrx.cloudfront.net"
        - "https://jacksonfio-griefcart-financial-continuity.hf.space"
      SupportedIdentityProviders:
        - COGNITO

  CognitoPermTriggers:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CognitoTriggersFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  # ─── Secrets Manager ─────────────────────────────────────────
  # GeminiApiKeySecret removed - using existing secret managed outside CloudFormation
  # The working secret ARN must be provided via the GeminiApiKeySecretArn parameter

  DocumentEncryptionContext:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "griefcart/${Environment}/encryption-context"
      Description: "Encryption context for document encryption"
      SecretString: !Sub '{"app":"griefcart","environment":"${Environment}"}'

  # ─── EventBridge ─────────────────────────────────────────────
  ContinuityScanSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "griefcart-${Environment}-continuity-scan"
      ScheduleExpression: rate(7 days)
      State: ENABLED
      Targets:
        - Arn: !GetAtt FinancialDetectiveFunction.Arn
          Id: FinancialDetectiveTarget

  DetectivePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FinancialDetectiveFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ContinuityScanSchedule.Arn

  # ─── Step Functions ──────────────────────────────────────────
  EmergencyWorkflow:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "griefcart-${Environment}-emergency"
      DefinitionString: !Sub
        - |-
          {
            "Comment": "Emergency Continuity Workflow",
            "StartAt": "Verify Identity",
            "States": {
              "Verify Identity": {
                "Type": "Task",
                "Resource": "${verifyFunction}",
                "Next": "Check Continuity Plan"
              },
              "Check Continuity Plan": {
                "Type": "Task",
                "Resource": "${planFunction}",
                "Next": "Determine Access Level"
              },
              "Determine Access Level": {
                "Type": "Choice",
                "Choices": [
                  {"Variable": "$.accessLevel", "StringEquals": "full", "Next": "FullAccess"},
                  {"Variable": "$.accessLevel", "StringEquals": "limited", "Next": "LimitedAccess"},
                  {"Variable": "$.accessLevel", "StringEquals": "emergency", "Next": "EmergencyRelease"}
                ],
                "Default": "EmergencyRelease"
              },
              "FullAccess": {
                "Type": "Task",
                "Resource": "${releaseFunction}",
                "Next": "GenerateRecoveryGuide"
              },
              "LimitedAccess": {
                "Type": "Task",
                "Resource": "${releaseFunction}",
                "Next": "GenerateRecoveryGuide"
              },
              "EmergencyRelease": {
                "Type": "Task",
                "Resource": "${releaseFunction}",
                "Next": "GenerateRecoveryGuide"
              },
              "GenerateRecoveryGuide": {
                "Type": "Task",
                "Resource": "${recoveryFunction}",
                "End": true
              }
            }
          }
        - verifyFunction: !GetAtt EmergencyWorkflowFunction.Arn
          planFunction: !GetAtt ContinuityPlanFunction.Arn
          releaseFunction: !GetAtt DocumentVaultFunction.Arn
          recoveryFunction: !GetAtt RecoveryAssistantFunction.Arn
      RoleArn: !GetAtt StepFunctionsRole.Arn

  # ─── CloudTrail ──────────────────────────────────────────────
  AuditLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "griefcart-${Environment}-audit"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKey

  AuditLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AuditLogBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub "arn:aws:s3:::${AuditLogBucket}"
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "arn:aws:s3:::${AuditLogBucket}/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": bucket-owner-full-control
          - Sid: S3ServerAccessLogsWrite
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "arn:aws:s3:::${AuditLogBucket}/*"

  CloudTrailTrail:
    Type: AWS::CloudTrail::Trail
    Properties:
      TrailName: !Sub "griefcart-${Environment}-trail"
      S3BucketName: !Ref AuditLogBucket
      IsLogging: true
      EnableLogFileValidation: true
      IncludeGlobalServiceEvents: true
      IsMultiRegionTrail: true
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true
          DataResources:
            - Type: AWS::S3::Object
              Values:
                - !Sub "arn:aws:s3:::${DocumentBucket}/"

  # ─── Lambda — Cognito Triggers ──────────────────────────────
  CognitoTriggersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "griefcart-${Environment}-cognito-triggers"
      CodeUri: lambdas/cognito-triggers/
      Handler: index.lambda_handler
      Timeout: 10
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt KmsKey.Arn

  # ─── Lambda — Document Vault ─────────────────────────────────
  DocumentVaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "griefcart-${Environment}-document-vault"
      CodeUri: lambdas/document-vault/
      Handler: index.lambda_handler
      Timeout: 60
      MemorySize: 512
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBWritePolicy:
            TableName: !Ref DocumentsTable
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::${DocumentBucket}/*"
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt KmsKey.Arn
      Environment:
        Variables:
          KMS_KEY_ID: !Ref KmsKey
          DOCUMENT_BUCKET: !Ref DocumentBucket

  # ─── Lambda — Financial Twin ─────────────────────────────────
  FinancialTwinFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "griefcart-${Environment}-financial-twin"
      CodeUri: lambdas/financial-twin/
      Handler: index.lambda_handler
      Timeout: 120
      MemorySize: 1024
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref TrustedPersonsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ContinuityPlansTable
        - DynamoDBWritePolicy:
            TableName: !Ref FinancialTwinTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt GraphSyncQueue.QueueName
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref GeminiApiKeySecretArn
                - !If [
                    HFSecretProvided,
                    !Ref HuggingFaceApiKeySecretArn,
                    !Ref "AWS::NoValue",
                  ]
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt KmsKey.Arn

  # ─── Lambda — Knowledge Graph Sync (SQS consumer) ───────────
  KnowledgeGraphSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "griefcart-${Environment}-graph-sync"
      CodeUri: lambdas/knowledge-graph-sync/
      Handler: index.lambda_handler
      Timeout: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FinancialTwinTable
        - DynamoDBWritePolicy:
            TableName: !Ref UsersTable
        - SQSPollerPolicy:
            QueueName: !GetAtt GraphSyncQueue.QueueName
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt KmsKey.Arn
      Events:
        GraphSyncQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt GraphSyncQueue.Arn
            BatchSize: 10

  # ─── Lambda — Financial Detective ────────────────────────────
  FinancialDetectiveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "griefcart-${Environment}-financial-detective"
      CodeUri: lambdas/financial-detective/
      Handler: index.lambda_handler
      Timeout: 300
      MemorySize: 1024
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref FinancialTwinTable
        - DynamoDBWritePolicy:
            TableName: !Ref UsersTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref GeminiApiKeySecretArn
                - !If [
                    HFSecretProvided,
                    !Ref HuggingFaceApiKeySecretArn,
                    !Ref "AWS::NoValue",
                  ]
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${DocumentBucket}/*"
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt KmsKey.Arn
  # ─── Lambda — Continuity Scorer ──────────────────────────────
  ContinuityScorerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "griefcart-${Environment}-continuity-scorer"
      CodeUri: lambdas/continuity-scorer/
      Handler: index.lambda_handler
      Timeout: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref TrustedPersonsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ContinuityPlansTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref GeminiApiKeySecretArn
                - !If [
                    HFSecretProvided,
                    !Ref HuggingFaceApiKeySecretArn,
                    !Ref "AWS::NoValue",
                  ]
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt KmsKey.Arn

  # ─── Lambda — Trusted Persons ───────────────────────────────
  TrustedPersonsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "griefcart-${Environment}-trusted-persons"
      CodeUri: lambdas/trusted-persons/
      Handler: index.lambda_handler
      Timeout: 30
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TrustedPersonsTable
        - DynamoDBWritePolicy:
            TableName: !Ref TrustedPersonsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBWritePolicy:
            TableName: !Ref UsersTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt NotificationTopic.TopicName
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail]
              Resource: "*"
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt KmsKey.Arn
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
                - secretsmanager:PutSecretValue
                - secretsmanager:UpdateSecret
              Resource: !Ref DocumentEncryptionContext

  # ─── Lambda — Emergency Workflow ────────────────────────────
  EmergencyWorkflowFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "griefcart-${Environment}-emergency-workflow"
      CodeUri: lambdas/emergency-workflow/
      Handler: index.lambda_handler
      Timeout: 30
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref TrustedPersonsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ContinuityPlansTable
        - Statement:
            - Effect: Allow
